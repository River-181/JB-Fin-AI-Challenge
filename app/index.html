<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JB LocalGuard OS</title>
    <link rel="stylesheet" href="./styles.css?v=hagentos-localguard-20260612" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="org-rail" aria-label="organization rail">
        <div class="rail-logo">JB</div>
        <button class="rail-item" type="button" title="전북은행 케이스만 보기" data-affiliate="전북은행">전북</button>
        <button class="rail-item" type="button" title="광주은행 케이스만 보기" data-affiliate="광주은행">광주</button>
        <button class="rail-item" type="button" title="JB우리캐피탈 케이스만 보기" data-affiliate="JB우리캐피탈">캐피탈</button>
        <div class="rail-spacer"></div>
        <button class="rail-icon" type="button" title="알림">!</button>
        <button class="rail-icon" type="button" title="설정">⚙</button>
      </aside>

      <aside class="sidebar" aria-label="main navigation">
        <div class="sidebar-brand">
          <p class="eyebrow">JB Fin:AI Agent Model</p>
          <h1>JB LocalGuard OS</h1>
          <span>JB 금융안전 Agent 운영 콘솔</span>
        </div>

        <button id="new-case-button" class="new-case-button" type="button">
          <span aria-hidden="true">＋</span>
          금융 위험 케이스 등록
        </button>

        <label class="sidebar-search">
          <span>⌘K</span>
          <input id="sidebar-search" type="search" placeholder="케이스, Agent, Skill 검색" />
        </label>

        <nav id="nav-list" class="nav-list" aria-label="workspace pages"></nav>

        <div class="sidebar-footer">
          <div>
            <strong id="system-health">Live</strong>
            <span>Heartbeat 38s · Mock runtime</span>
          </div>
        </div>
      </aside>

      <main class="main-surface">
        <div id="page-content" class="page-content"></div>
      </main>

      <aside class="properties-panel" aria-label="properties panel">
        <div id="context-panel" class="context-panel"></div>
      </aside>
    </div>
    <script src="./app.js?v=hagentos-localguard-20260612"></script>
  </body>
</html>
